<!DOCTYPE html>
<!-- This code is adapted from https://docs.getgrist.com/qnJkZmcudBnq/Simple-mermaid-edit-and-view to render markdown with Claude -->
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: sans-serif;
        overflow: hidden;
        display: flex;
      }
      #editor-container {
        width: 30%;
        height: 100%;
        border-right: 1px solid;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      #editor-container.minimized {
        width: 28px;
      }
      #editor-container.minimized #editor {
        display: none;
      }
      #toggle-editor {
        flex: 0 0 auto;
        width: 100%;
        height: 24px;
        line-height: 24px;
        padding: 0;
        border: none;
        border-bottom: 1px solid;
        background: none;
        cursor: pointer;
        font-family: sans-serif;
        font-size: 14px;
        box-sizing: border-box;
      }
      #editor {
        width: 100%;
        flex: 1;
        resize: none;
        padding: 10px;
        font-family: monospace;
        font-size: 13px;
        border: none;
        outline: none;
        box-sizing: border-box;
      }
      #canvas {
        flex: 1;
        height: 100%;
        cursor: grab;
        position: relative;
        overflow: hidden;
      }
      #canvas:active {
        cursor: grabbing;
      }
      #canvas table {
        border-collapse: collapse;
      }
      #canvas th {
        border-bottom-width: medium;
        border-bottom-style: solid;
      }
      #canvas td {
        border-bottom-width: thin;
        border-bottom-style: solid;
      }
      #diagram {
        position: absolute;
        transform-origin: 0 0;
        user-select: none;
        max-width: 900px;
        padding: 20px;
        box-sizing: border-box;
      }
      #diagram pre.mermaid-error {
        border: 1px solid;
        border-radius: 4px;
        padding: 8px;
        white-space: pre-wrap;
      }
      #error {
        position: absolute;
        bottom: 10px;
        left: 10px;
        right: 10px;
        padding: 10px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        display: none;
        z-index: 10;
        border: 1px solid;
      }
    </style>
  </head>
  <body>
    <script type="module" src="./app.js"></script>
    <div id="editor-container">
      <button id="toggle-editor" title="Toggle editor" aria-label="Toggle editor"></button>
      <textarea
        id="editor"
        placeholder="Tapez votre Markdown ici (avec des blocs ```mermaid)..."
      ></textarea>
    </div>

    <div id="canvas">
      <div id="error"></div>
      <div id="diagram"></div>
    </div>
  </body>
</html>
