<!DOCTYPE html>
<!-- This code is adapted from https://docs.getgrist.com/qnJkZmcudBnq/Simple-mermaid-edit-and-view -->
<html>
  <head>
    <meta charset="UTF-8" />
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: sans-serif;
        overflow: hidden;
        display: flex;
      }
      #editor-container {
        width: 30%;
        height: 100%;
        border-right: 1px solid #ccc;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
      }
      #editor {
        width: 100%;
        height: 100%;
        resize: none;
        padding: 10px;
        font-family: monospace;
        font-size: 13px;
        border: none;
        outline: none;
        box-sizing: border-box;
        background: #f9f9f9;
      }
      #canvas {
        width: 70%;
        height: 100%;
        cursor: grab;
        position: relative;
        overflow: hidden;
        background: #fff;
      }
      #canvas:active {
        cursor: grabbing;
      }
      #diagram {
        position: absolute;
        transform-origin: 0 0;
        user-select: none;
        max-width: 900px;
        padding: 20px;
        box-sizing: border-box;
        background: #fff;
      }
      #diagram pre.mermaid-error {
        color: #e53e3e;
        background: #fff5f5;
        border: 1px solid #fed7d7;
        border-radius: 4px;
        padding: 8px;
        white-space: pre-wrap;
      }
      #error {
        position: absolute;
        bottom: 10px;
        left: 10px;
        right: 10px;
        color: #e53e3e;
        background: #fff5f5;
        padding: 10px;
        border-radius: 4px;
        font-family: monospace;
        font-size: 12px;
        display: none;
        z-index: 10;
        border: 1px solid #fed7d7;
      }
    </style>
  </head>
  <body>
    <script type="module" src="./app.js"></script>
    <div id="editor-container">
      <textarea
        id="editor"
        placeholder="Tapez votre Markdown ici (avec des blocs ```mermaid)..."
      ></textarea>
    </div>

    <div id="canvas">
      <div id="error"></div>
      <div id="diagram"></div>
    </div>
  </body>
</html>
